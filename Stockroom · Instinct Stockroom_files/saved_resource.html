    </body><style class="stylus">/* ==UserStyle==

/* Expand the main thread width (the 40rem/48rem CSS var limiter) */
:root {
    --thread-content-max-width: 100vw !important;
}

/* In case the var is set on a container rather than :root */
[class*="thread-content-max-width"],
[class*="max-w-(--thread-content-max-width)"],
.agent-turn {
    --thread-content-max-width: 100vw !important;
    max-width: 100vw !important;
    width: 100% !important;
}

/* Remove centering that keeps a narrow column */
.mx-auto {
    margin-left: 0 !important;
    margin-right: 0 !important;
}

/* Remove prose limiter (the 65ch rule) */
.prose,
.markdown.prose,
[class*="prose"] {
    max-width: none !important;
    width: 100% !important;
}</style></html>
